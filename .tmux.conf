# different icons
# set -g status-left "#[fg=#606079][#{S:#{?#{window_zoomed_flag},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]✦#[none]#[fg=#606079] , ✦ },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]✧#[none]#[fg=#606079] , ✧ },#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * }}},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#e8b589]#[underscore]✦#[none]#[fg=#606079] , ✦ },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#90a0b5]#[underscore]✧#[none]#[fg=#606079] , ✧ },#{?#{==:#{session_name},#{client_session}}, #[fg=#7e98e8]#[underscore]*#[none]#[fg=#606079] , * }}}}}] #S"

# just stars, color doesnt change
# set -g status-left "#[fg=#606079][#{S:#{?#{==:#{session_name},#{client_session}}, #[fg=#7e98e8]#[underscore]*#[none]#[fg=#606079] , * }}] #S"

# just stars, colors match
# set -g status-left " #[fg=#aeaed1]#S#[none] #[fg=#606079]/#[fg=#aeaed1]/#[fg=#606079]/#[align=absolute-centre] #[fg=#606079][#{S:#{?#{window_zoomed_flag},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * }}},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#e8b589]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#90a0b5]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#7e98e8]#[underscore]*#[none]#[fg=#606079] , * }}}}}]"
set -g status-left ""
set -g status-right "#[align=left]#[fg=#aeaed1]* #[fg=#606079]'#{?#{==:#{pane_current_path},#{HOME}},~,#{s|$HOME|~|:#{d:pane_current_path}}/#{b:pane_current_path}}'#[fg=#606079]#[align=right]#[fg=#606079]#S#[none] #[fg=#606079][#{S:#{?#{window_zoomed_flag},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#8c4555]#[underscore]*#[none]#[fg=#606079] , * }}},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#e8b589]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#90a0b5]#[underscore]*#[none]#[fg=#606079] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#7e98e8]#[underscore]*#[none]#[fg=#606079] , * }}}}}]"

# show current dir
bind-key D display-message "#(echo #{pane_current_path} | sed 's#$HOME#~#g')"

# bind-key R rename-window '#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}'
bind-key W command-prompt -I "#W" "rename-window '%%'"
bind-key S command-prompt -I "#S" "rename-session '%%'"

setw -g pane-border-status bottom
setw -g pane-border-format ""
# setw -g pane-active-border-style "#{?#{==:#{session_name},float},fg=#e8b589,#{?#{==:#{session_name},ephemeral},fg=#90a0b5 ,fg=#7e98e8}}"
setw -g pane-active-border-style "#{?#{window_zoomed_flag},fg=#8c4555,#{?#{==:#{session_name},float},fg=#e8b589,#{?#{==:#{session_name},ephemeral},fg=#90a0b5,fg=#7e98e8}}}"
setw -g pane-border-style "fg=#606079"
setw -g pane-border-lines "simple"
setw -g pane-border-indicators "off"
setw -g pane-scrollbars "off"
setw -g pane-scrollbars-style "fg=#606079"

setw -g message-style "fg=#aeaed1"
setw -g cursor-style underline
set -g prompt-cursor-colour "#aeaed1"

##
## window styling
##

# set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}'

# Set the foreground/background color for the active window
# setw -g window-active-style "bg=#131313"
setw -g window-active-style "bg=terminal"

# Set the foreground/background color for all other windows
# setw -g window-style "bg=#111111"
setw -g window-style "bg=terminal"

# set -g window-status-current-format "#[bold]#{?#{e|>=:#{client_width},100}, #{pane_current_command} #[fg=#6e94b2]#[none][#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] , [#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] }"
# set -g window-status-format "#[fg=#aeaed1]#{?#{e|>=:#{client_width},100}, #{pane_current_command} #[fg=#606079]#[none][#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] , [#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] }"

set -g window-status-current-format "#{?#{e|<:#{client_width},50}, #[bold]#I ,#[bold]#{?#{window_zoomed_flag},#{?#{e|>=:#{client_width},100}, #[fg=#8c4555]#I #[fg=#c48282][#{pane_current_command}] , #[fg=#8c4555]#I [#{pane_current_command}] },#{?#{e|>=:#{client_width},100}, #{?#{==:#{session_name},float},#[fg=#e8b589]#I #[fg=#f3be7b][#{pane_current_command}],#{?#{==:#{session_name},ephemeral},#[fg=#90a0b5]#I #[fg=#b4d4cf][#{pane_current_command}],#I #[fg=#6e94b2][#{pane_current_command}]}} , #{?#{==:#{session_name},float},#[fg=#e8b589],#{?#{==:#{session_name},ephemeral},#[fg=#90a0b5],}}#I [#{pane_current_command}] }}}"

set -g window-status-format "#{?#{e|<:#{client_width},50}, #[fg=#aeaed1]#I ,#[fg=#aeaed1]#{?#{e|>=:#{client_width},100}, #I #[fg=#606079][#{pane_current_command}] , #I #[fg=#606079][#{pane_current_command}] }}"

set -g window-status-separator "#[fg="#aeaed1"]*"

set -g window-status-current-style "fg=#7e98e8"
set -g window-status-style "fg=#606079, bg=default"
set -g window-status-last-style "fg=#606079, bg=default"

set -g window-status-activity-style "fg=#606079, bg=default"
set -g window-status-bell-style "fg=#aeaed1,bg=default, bold"

set-option -g status-interval 1

##
## plugins
##

# set -g @plugin 'tmux-plugins/tpm'

set -g @tpm_plugins '               \
   tmux-plugins/tpm                 \
   tmux-plugins/tmux-resurrect      \
   tmux-plugins/tmux-continuum      \
   alexwforsythe/tmux-which-key     \
   wfxr/tmux-fzf-url                \
'

set -g @continuum-restore 'off'
set -g @fzf-url-bind 'u'

# initialize tpm
run -b '~/.tmux/plugins/tpm/tpm'
