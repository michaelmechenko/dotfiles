unbind r
bind r source-file ~/.config/.tmux.conf

# Self-heal exec bits on load/reload: run-shell binds EXECUTE these scripts by path, so a
# checkout that didn't honor the exec bit (core.fileMode=false) would break them. Foreground
# so it finishes before any keybind fires; chmod is a binary, needs no script +x itself.
run-shell "chmod +x ~/.config/tmux_scripts/* 2>/dev/null"

set -g focus-events on
# set -g allow-passthrough on
# NOTE: do not enable extended-keys 'always' — it makes tmux forward ALL modified keys
# in CSI-u form, breaking every legacy-encoded M-Shift binding here (M-J/M-L/M-W/...).
# To pass a custom key through tmux, use an unmodified key (e.g. F13) instead — see
# ghostty ctrl+tab -> F13 and the ^[[25~ bind in .zshrc.
# set -s extended-keys on
# set -as terminal-features 'xterm*:extkeys'

unbind C-b
set -g prefix C-Space
bind c new-window -c "#{pane_current_path}"
set -g default-command /bin/zsh
set-option -g renumber-windows on
set -g base-index 1 # start windows numbering at 1
set-option -g mouse on

# Dynamic active bg: collapse to inactive color when there's no inactive pane to contrast against
set -g command-alias[200] 'refresh-active-bg=if -F "#{||:#{==:#{window_panes},1},#{window_zoomed_flag}}" { setw window-active-style "bg=#100E11" ; setw pane-active-border-style "fg=#{@color-ephemeral}, bg=#100E11, bold" } { setw window-active-style "bg=#16141a" ; setw pane-active-border-style "fg=#{@color-ephemeral}, bg=#100E11, bold" }'

set-hook -g after-resize-pane    refresh-active-bg
set-hook -g window-layout-changed refresh-active-bg
set-hook -g after-new-window     refresh-active-bg
set-hook -g after-select-window  refresh-active-bg
set-hook -g pane-exited          refresh-active-bg

# On copy/view-mode entry: switch to a block cursor. On exit: restore the global underline
# (setw -u) and tear down the M-U-only copy-mode line numbers (the per-pane override the M-U
# binding set survives entry because the entry branch doesn't touch it).
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" { setw cursor-style block } { setw -u cursor-style ; set -pu copy-mode-line-numbers }'


# Colors
set -g @color-default "#a9b1d6"
set -g @color-inactive "#656a80"
set -g @color-lavender "#bebedb"
set -g @color-lavender2 "#aeaed1"
set -g @color-active "#bebedb"
set -g @color-dusty_pink "#bb9dbd"
set -g @color-float "#aeaed1"
set -g @color-rose "#d8647e"
set -g @color-ephemeral "#aeaed1"

# Originals stored as user options so the M-d toggle can restore them via a single ref
set -g @window-status-current-format-base "#{?#{e|>=:#{client_width},100},#[fg=#{@color-ephemeral}]#I [#W],#[fg=#{@color-ephemeral}]#I [#{=/-14/...:#{window_name}}]}"
set -g @window-status-format-base "#{?#{e|>=:#{client_width},100},#[fg=#{@color-inactive}]#I [#W],#[fg=#{@color-inactive}]#I}"

##
## keybindings
##

set-window-option -g mode-keys vi
# Mouse-drag copy: scrolled up (scroll_position>0) -> stay in copy mode;
# at the live bottom (==0) -> copy and exit immediately.
bind-key -T copy-mode-vi MouseDragEnd1Pane if -F '#{scroll_position}' {
    send-keys -X copy-pipe 'pbcopy'
} {
    send-keys -X copy-pipe-and-cancel 'pbcopy'
}
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
set -s copy-command 'pbcopy'

# half-page-up into copy mode (behind prefix to not shadow C-u kill-line)
# Line numbers show ONLY for this deliberate entry: set the per-pane override BEFORE
# entering (copy-mode reads it at init) — the pane-mode-changed hook tears it down on
# exit so M-u/M-n (and mouse-wheel) inherit the global copy-mode-line-numbers=off.
bind-key -n M-U set -p copy-mode-line-numbers hybrid \; copy-mode

# scroll up 10 lines (enters copy-mode; -e auto-exits at the live bottom)
bind-key -n M-u if-shell -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' 'send-keys M-u' 'run-shell "tmux copy-mode -e ; tmux send-keys -N 10 -X scroll-up"'

# scroll down 10 lines (-e exits copy-mode once back at the live bottom)
bind-key -n M-n if-shell -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' 'send-keys M-n' 'run-shell "tmux copy-mode -e ; tmux send-keys -N 10 -X scroll-down"'

# vim keybinds
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -n M-h select-pane -L
bind-key -n M-j if -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' { send-keys M-j } { select-pane -D }
bind-key -n M-k if -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' { send-keys M-k } { select-pane -U }
bind-key -n M-l select-pane -R

# split window
bind-key -n M-J split-window -v -c "#{pane_current_path}"
bind-key -n M-L split-window -h -l 50% -c "#{pane_current_path}"

# resize panes
bind-key -n M-W resize-pane -U 
bind-key -n M-S resize-pane -D 
bind-key -n M-A resize-pane -L 
bind-key -n M-D resize-pane -R 

# window focus
bind-key -n M-z resize-pane -Z
bind-key -n M-x confirm-before -c z -p "kill pane? (z/c)" "kill-pane"
bind-key -n M-X confirm-before -c z -p "kill window? (zz/c)" "confirm-before -c z -p 'kill window? (z/c)' kill-window"

# new window
bind-key -n M-e new-window -c "#{pane_current_path}"

# floating terminals
bind-key -n M-f run-shell "~/.config/tmux_scripts/tmuxpopup"
# bind-key -n M-F run-shell "~/.config/tmux_scripts/tmuxpopup-opposite"
bind-key -n M-F if-shell '[ "$(tmux display-message -p "#{session_name}")" = "float" ]' 'switch-client -l' 'switch-client -t float'
bind-key -n M-c run-shell "~/.config/tmux_scripts/tmuxpopup-ephemeral"

# popup maximize/restore (float and ephemeral sessions)
bind-key -n M-Up if -F '#{||:#{m:float*,#{session_name}},#{m:ephemeral*,#{session_name}}}' { run-shell "~/.config/tmux_scripts/tmux-popup-resize maximize" } { resize-pane -U }
bind-key -n M-Down if -F '#{||:#{m:float*,#{session_name}},#{m:ephemeral*,#{session_name}}}' { run-shell "~/.config/tmux_scripts/tmux-popup-resize restore" }
bind-key -n M-m if -F '#{||:#{m:float*,#{session_name}},#{m:ephemeral*,#{session_name}}}' { run-shell "~/.config/tmux_scripts/tmux-popup-resize toggle" }

# create new window from pane's cwd in session float
bind-key f run-shell 'tmux new-window -t float: -c "$(tmux display-message -p "#{pane_current_path}")" && ~/.config/tmux_scripts/tmuxpopup'

# choose session/pane
bind-key -n M-s run-shell "~/.config/tmux_scripts/tmux-session-ls"
bind-key -n M-w run-shell "~/.config/tmux_scripts/tmux-window-ls"

# rename pane
bind-key -n M-t command-prompt -p "rename pane:" -I "#{pane_title}" "select-pane -T '%1' ; set -p @pane-named '%1'"

# tree view popup
bind-key -n M-T run-shell "~/.config/tmux_scripts/tmux-other-panes-ls"

# mouse click on status-right to choose session / pane.
# NOTE: run-shell is backgrounded (-b) to dodge a tmux next-3.7 segfault in the
# synchronous run-shell fork path (server_client_key_callback NULL strcmp, "crashed
# on child side of fork pre-exec") that crashed the whole server on status-right clicks.
bind-key -n MouseDown1StatusRight run-shell -b '~/.config/tmux_scripts/tmux-status-session-ls'
bind-key -n MouseDown3StatusRight run-shell -b '~/.config/tmux_scripts/tmux-status-pane-ls'

# pane right-click
unbind -T root MouseDown3Pane
bind -T root MouseDown3Pane if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" {
    select-pane -t =
    send-keys -M
} {
    display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
        "open in finder" o { run-shell "open '#{pane_current_path}'" } \
        '' \
        "#{?#{m/r:(copy|view)-mode,#{pane_mode}},go to top,}" < { send-keys -X history-top } \
        "#{?#{m/r:(copy|view)-mode,#{pane_mode}},go to bottom,}" > { send-keys -X history-bottom } \
        '' \
        "#{?#{&&:#{buffer_size},#{!:#{pane_in_mode}}},paste,}" p { paste-buffer } \
        '' \
        "#{?mouse_word,copy word,}" c { set-buffer "#{q:mouse_word}" } \
        "#{?mouse_line,copy line,}" l { set-buffer "#{q:mouse_line}" } \
        "#{?mouse_hyperlink,copy link,}" h { set-buffer "#{q:mouse_hyperlink}" } \
        '' \
        "horizontal split" h { split-window -h } \
        "vertical split" v { split-window -v } \
        '' \
        "#{?#{>:#{window_panes},1},,-}swap up" u { swap-pane -U } \
        "#{?#{>:#{window_panes},1},,-}swap down" d { swap-pane -D } \
        "#{?pane_marked_set,,-}swap marked" s { swap-pane } \
        '' \
        kill x { kill-pane } \
        respawn r { respawn-pane -k } \
        "#{?pane_marked,unmark,mark}" m { select-pane -m } \
        "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,unzoom,zoom}" z { resize-pane -Z }
}

# Alt+right-click (force menu even when app has mouse focus)
unbind -T root M-MouseDown3Pane
bind -T root M-MouseDown3Pane display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
    "open in finder" o { run-shell "open '#{pane_current_path}'" } \
    '' \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},go to top,}" < { send-keys -X history-top } \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},go to bottom,}" > { send-keys -X history-bottom } \
    '' \
    "#{?#{&&:#{buffer_size},#{!:#{pane_in_mode}}},paste,}" p { paste-buffer } \
    '' \
    "#{?mouse_word,copy word,}" c { set-buffer "#{q:mouse_word}" } \
    "#{?mouse_line,copy line,}" l { set-buffer "#{q:mouse_line}" } \
    "#{?mouse_hyperlink,copy link,}" h { set-buffer "#{q:mouse_hyperlink}" } \
    '' \
    "horizontal split" h { split-window -h } \
    "vertical split" v { split-window -v } \
    '' \
    "#{?#{>:#{window_panes},1},,-}swap up" u { swap-pane -U } \
    "#{?#{>:#{window_panes},1},,-}swap down" d { swap-pane -D } \
    "#{?pane_marked_set,,-}swap marked" s { swap-pane } \
    '' \
    kill x { kill-pane } \
    respawn r { respawn-pane -k } \
    "#{?pane_marked,unmark,mark}" m { select-pane -m } \
    "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,unzoom,zoom}" z { resize-pane -Z }

# break pane into new window (names the window after a manually-renamed pane)
bind q run-shell -b "~/.config/tmux_scripts/tmux-break-pane '#{pane_id}'"

bind-key -n M-q if -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' { send-keys M-q } { run-shell -b "~/.config/tmux_scripts/tmux-break-pane '#{pane_id}'" }

# send to prev/next window

# next window (tidies the destination with main-vertical if it already had panes)
bind-key -n M-E run-shell "~/.config/tmux_scripts/tmux-send-pane-adjacent next"

# prev window
bind-key -n M-Q run-shell "~/.config/tmux_scripts/tmux-send-pane-adjacent prev"

# send pane to 'n' window
bind-key -n M-i run-shell "~/.config/tmux_scripts/tmux-pane-to-window"

# send pane to session
bind-key -n M-I run-shell "~/.config/tmux_scripts/tmux-window-to-session"

# swap windows
bind-key -n M-, swap-window -t -1\; select-window -t -1
bind-key -n M-. swap-window -t +1\; select-window -t +1

# swap panes
bind-key -n M-< swap-pane -U
bind-key -n M-> swap-pane -D

# tree view
# bind-key -n M-W choose-window
# bind-key -n M-S choose-session
bind-key t choose-tree

# layouts
# main-vertical: main pane = half width so it matches the stacked right column
setw -g main-pane-width 50%
bind-key -n M-V select-layout even-vertical
# main-vertical: main pane (left) at 50% width, others stacked on the right. The `-l 50%`
# on M-L makes a fresh h-split land on the same divider (both round the leftover col right),
# so M-H doesn't shift a 2-pane split; for 3+ panes it stacks the right column.
bind-key -n M-H select-layout main-vertical
bind-key -n M-v select-layout tiled

bind-key -n M-\; previous-window
bind-key -n M-\' next-window

bind-key -n M-1 select-window -t:=1
bind-key -n M-2 select-window -t:=2
bind-key -n M-3 select-window -t:=3
bind-key -n M-4 select-window -t:=4
bind-key -n M-5 select-window -t:=5
bind-key -n M-6 select-window -t:=6
bind-key -n M-7 select-window -t:=7
bind-key -n M-8 select-window -t:=8
bind-key -n M-9 select-window -t:=9

# switch sessions
bind-key -n M-\: switch-client -p -O index
bind-key -n M-\[ switch-client -p -O index
bind-key -n M-\" switch-client -n -O index
bind-key -n M-\] switch-client -n -O index

# new session
bind-key C command-prompt "new -s '%%'"
bind-key -n M-C command-prompt "new -s '%%'"

##
## status bar
##

set-option -g status-position top
set -g status on

set -g status-style bg=#100E11
set -g status-justify left

set -g status-left-length 200
set -g status-right-length 200

set -g status-left ""
# set -g status-left '#[align=absolute-centre]#[fg=#656a80]`#{?#{==:#{pane_current_path},#{HOME}},~,#{s|$HOME|~|:#{d:pane_current_path}}/#{b:pane_current_path}}`'

# Toggle status-left visibility. In directory mode, a leading star brings the
# bare inter-window separators (N-1) up to N.
bind-key -n M-N if-shell 'test -z "#{status-left}"' {
    set -g status-left "#[fg=#{@color-inactive}]* #[align=absolute-centre]#[fg=#{@color-inactive}]`#{?#{==:#{pane_current_path},#{HOME}},~,#{s|$HOME|~|:#{d:pane_current_path}}}/#{b:pane_current_path}`"
    set -g window-status-format ""
    set -g window-status-current-format ""
} {
    set -g status-left ""
    set -g window-status-format "#{E:#{@window-status-format-base}}"
    set -g window-status-current-format "#{E:#{@window-status-current-format-base}}"
}

# color defined by session name
# set -g status-right "#[fg=#656a80]#S#[none] #[fg=#656a80][#{S:#{?#{window_zoomed_flag},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#bebedb]#[underscore]*#[none]#[fg=#656a80] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#bebedb]#[underscore]*#[none]#[fg=#656a80] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#bebedb]#[underscore]*#[none]#[fg=#656a80] , * }}},#{?#{==:#{session_name},float},#{?#{==:#{session_name},#{client_session}}, #[fg=#8ba9c1]#[underscore]*#[none]#[fg=#656a80] , * },#{?#{==:#{session_name},ephemeral},#{?#{==:#{session_name},#{client_session}}, #[fg=#d8647e]#[underscore]*#[none]#[fg=#656a80] , * },#{?#{==:#{session_name},#{client_session}}, #[fg=#c9b1c9]#[underscore]*#[none]#[fg=#656a80] , * }}}}}]"

set -g status-right "#{?#{<:#{client_width},100},,#[fg=#{@color-inactive}]#S#[none] #[fg=#{@color-inactive}][#{S:#{?#{==:#{session_name},#{client_session}}, #[fg=#{@color-ephemeral}]#[underscore]*#[none]#[fg=#{@color-inactive}] , * }}]}"

# bind-key R rename-window '#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}'
bind-key W command-prompt -I "#W" "rename-window '%%'"
bind-key S command-prompt -I "#S" "rename-session '%%'"
bind-key -n M-R command-prompt -I "#S" "rename-session '%%'"
bind-key -n M-r command-prompt -I "#W" "rename-window '%%'"

setw -g pane-border-status top
# setw -g pane-border-format "#{?#{window_zoomed_flag},#[align=absolute-centre]*-*-*---*---*---*---*-*-*---*---*---*---*-*-*#[none],#{?pane_active,#[align=left]*-*-*-*-*-*-*}}"
setw -g pane-border-format "#{?#{window_zoomed_flag},,#{?pane_active,#[align=left]*-*-*-*-*-*-*}}"

# setw -g pane-active-border-style "#{?#{==:#{session_name},float},fg=#8ba9c1,#{?#{==:#{session_name},ephemeral},fg=#d8647e ,fg=#c9b1c9}}"
# setw -g pane-active-border-style "#{?#{window_zoomed_flag},fg=#{@color-ephemeral},#{?#{==:#{session_name},float},fg=#{@color-float},#{?#{==:#{session_name},ephemeral},fg=#{@color-ephemeral},fg=#{@color-ephemeral}}}}"
setw -g pane-active-border-style "fg=#{@color-ephemeral}, bg=#100E11"
setw -g pane-border-style "fg=#{@color-inactive}, dim, bg=#100E11"
setw -g pane-border-lines "single"
setw -g pane-border-indicators "colour"
setw -g pane-scrollbars "off"

setw -g popup-border-lines "rounded"

# fill=#100E11 is REQUIRED on next-3.7+: PR #4861 ("Draw message as one format",
# commit 19f3fb1) made the command-prompt repaint the full status width only when the
# message style carries a fill=; without it the window list bleeds through to the right
# of the prompt text (rename-window / : command-prompt). bg alone is not enough.
setw -g message-style "fg=#{@color-inactive}, bg=#100E11, fill=#100E11"
set -g message-command-style "fg=#{@color-inactive}, bg=#100E11, fill=#100E11"
# copy-mode position indicator (top-right time/scroll block): slate block (matches the
# scrollbar slider), light text. Set directly so mode-style (choose-tree/menus) is untouched.
setw -g copy-mode-position-style "fg=#a9b1d6,bg=#606079"
setw -g cursor-style underline
set -g prompt-cursor-colour "#a9b1d6"

# copy-mode line numbers (next-3.7): hybrid = current line absolute, others relative
# (vim number+relativenumber). Gutter shifts content but selection coords are un-offset
# internally, so copied text is unaffected. Press N in copy mode if not shown by default.
setw -g copy-mode-line-numbers off
setw -g copy-mode-line-number-style "fg=#{@color-inactive},dim"
setw -g copy-mode-current-line-number-style "fg=#{@color-active},bold"

##
## window styling
##

set-option -g automatic-rename on
# Map a version-like command to "claude" (Claude Code sets its comm to its version; the
# separator has been both "." e.g. 2.1.160 and "_" e.g. 2_1_193, so [._] matches either).
set-option -g automatic-rename-format '#{?#{m:*[0-9][._][0-9]*[._][0-9]*,#{pane_current_command}},claude,#{pane_current_command}}'

# Set the foreground/background color for the active window
# setw -g window-active-style "bg=#131313"
setw -g window-active-style "bg=#100E11"

# Set the foreground/background color for all other windows
# setw -g window-style "bg=#111111"
setw -g window-style "bg=#100E11"

# set -g window-status-current-format "#[bold]#{?#{e|>=:#{client_width},100}, #{pane_current_command} #[fg=#bb9dbd]#[none][#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] , [#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] }"
# set -g window-status-format "#[fg=#a9b1d6]#{?#{e|>=:#{client_width},100}, #{pane_current_command} #[fg=#656a80]#[none][#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] , [#{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}] }"

set -g window-status-current-format "#{E:#{@window-status-current-format-base}}"
set -g window-status-format "#{E:#{@window-status-format-base}}"

set -g window-status-separator "#[fg=#656a80] * "

set -g window-status-current-style "fg=#{@color-active}, bg=#100E11"
set -g window-status-style "fg=#{@color-default}, bg=#100E11"

set -g window-status-last-style "fg=#{@color-default}, bg=#100E11"

set -g window-status-activity-style "fg=#{@color-default}, bg=#100E11"
set -g window-status-bell-style "fg=#{@color-inactive}, bg=#100E11, bold"

set-option -g status-interval 0

## plugins

# M-o: tmux-fzf-url via a launcher that also surfaces file paths/bare filenames and routes a
# selected file -> nvim split (URLs still -> `open`). See tmux-fzf-url-open.
bind-key -n M-o run -b "~/.config/tmux_scripts/tmux-fzf-url-open"
# extrakto: keep the user's FZF_DEFAULT_OPTS palette (default unset strips it), and route
# ctrl-o opens through the shared tmux-open-target (file -> nvim split; else fall back to `open`).
# The M-K wrapper records the origin pane so the opener can resolve relative paths + split off it.
set -g @extrakto_fzf_unset_default_opts "false"
set -g @extrakto_open_tool "~/.config/tmux_scripts/tmux-open-target"
bind-key -n M-K run-shell "~/.config/tmux_scripts/tmux-extrakto-launch '#{pane_id}'"

# nnn file explorer (in-nnn ;h / ;v spawn splits in the origin window)
#   M-d -> centred float;  M-B -> overlay the launching pane.
bind-key -n M-d run-shell "~/.config/tmux_scripts/tmux-nnn-explorer"
bind-key -n M-B run-shell "~/.config/tmux_scripts/tmux-nnn-explorer pane"

# claude code integration
# M-b: cross-tmux menu of all claude sessions (enter=focus, k=approve all waiting)
bind-key -n M-b run-shell "~/.config/tmux_scripts/tmux-claude-menu"
# M-G: open current session's last response in an nvim split (right if 1 pane, else above the right pane)
bind-key -n M-G run-shell "~/.config/tmux_scripts/tmux-claude-last-response"
# prefix . : cycle to next claude session needing user input
bind-key . run-shell "~/.config/tmux_scripts/tmux-claude-next-permission"
# M-P: open current session's plan in an nvim split (same right-side placement as M-G)
bind-key -n M-P run-shell "~/.config/tmux_scripts/tmux-claude-plan"

bind-key -n M-g if -F '#{||:#{popup_width},#{==:#{session_name},nnn}}' { send-keys M-g } { run-shell "~/.config/tmux_scripts/tmux-lazygit-popup" }
