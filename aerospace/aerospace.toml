after-startup-command = [
  'exec-and-forget borders',
  'exec-and-forget sketchybar'
]

exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

on-focus-changed = ['exec-and-forget sketchybar --trigger aerospace_focus_change']

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
[gaps]
    inner.horizontal = 16
    inner.vertical =   16
    outer.left =       52
    outer.bottom =     52
    outer.top =        [ {monitor."Built-*" = 50}, 74 ]
    outer.right =      52

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    cmd-slash = 'layout accordion horizontal vertical'
    cmd-shift-slash = 'layout tiles horizontal vertical'

    # toggle floating window; keep on-screen frame when going tiling->floating (HS wrapper, refreshes bar)
    cmd-shift-s = 'exec-and-forget hs -c "toggleFloatKeepPos()"'

    # toggle outer monitor gaps (16 <-> 64); inner gaps unchanged
    cmd-shift-v = 'exec-and-forget /bin/bash ~/.config/aerospace/toggle_gaps.sh'

    # toggle cmd-N / cmd-shift-N roles (workspace <-> window switching)
    cmd-shift-b = 'exec-and-forget /bin/bash ~/.config/aerospace/toggle_keyswap.sh'

    # fullscreen (trigger sketchybar so the border tint + name brackets refresh immediately)
    cmd-shift-f = ['fullscreen', 'exec-and-forget sketchybar --trigger aerospace_focus_change']
    cmd-m       = ['fullscreen', 'exec-and-forget sketchybar --trigger aerospace_focus_change']

    # balance sizes
    cmd-shift-0 = 'balance-sizes'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    cmd-w = 'close'
    cmd-h = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace left'
    cmd-j = 'focus --boundaries-action wrap-around-the-workspace down'
    cmd-k = 'focus --boundaries-action wrap-around-the-workspace up'
    cmd-l = 'focus --ignore-floating --boundaries-action wrap-around-the-workspace right'
    cmd-backtick = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace_window.sh next'
    cmd-shift-backtick = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace_window.sh prev'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    # put focused window and the nearest node in the specified direction under a common parent container
    cmd-ctrl-shift-h = 'join-with left'
    cmd-ctrl-shift-j = 'join-with down'
    cmd-ctrl-shift-k = 'join-with up'
    cmd-ctrl-shift-l = 'join-with right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    cmd-shift-minus = 'resize smart -50'
    cmd-shift-equal = 'resize smart +50'
    cmd-ctrl-minus = 'resize smart -325'
    cmd-ctrl-equal = 'resize smart +325'
    cmd-shift-up    = 'resize height +50'
    cmd-shift-down  = 'resize height -50'
    cmd-shift-left  = 'resize width -50'
    cmd-shift-right = 'resize width +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    # cmd-N / cmd-shift-N route through keyswap.sh; cmd-shift-b swaps their roles.
    # Default: cmd-N => workspace, cmd-shift-N => window.
    cmd-1 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh ws 1'
    cmd-2 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh ws 2'
    cmd-3 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh ws 3'
    cmd-4 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh ws 4'
    cmd-5 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh ws 5'

    cmd-shift-1 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 1'
    cmd-shift-2 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 2'
    cmd-shift-3 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 3'
    cmd-shift-4 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 4'
    cmd-shift-5 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 5'
    cmd-shift-6 = 'exec-and-forget /bin/bash ~/.config/aerospace/keyswap.sh win 6'

    cmd-alt-1 = ['workspace 1^']
    cmd-alt-2 = ['workspace 2^']

    cmd-shift-a = 'exec-and-forget /bin/bash ~/.config/aerospace/move_workspace_cycle.sh prev'
    cmd-shift-d = 'exec-and-forget /bin/bash ~/.config/aerospace/move_workspace_cycle.sh next'

    cmd-shift-w = ["move-node-to-monitor --focus-follows-window --wrap-around next", 'exec-and-forget hs -c "almostMaximize()"']

    # cmd-;/' cycle windows (= cmd-`/cmd-shift-`); cmd-shift-;/' cycle workspaces
    cmd-semicolon       = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace_window.sh prev'
    cmd-quote           = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace_window.sh next'
    cmd-shift-semicolon = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace.sh prev'
    cmd-shift-quote     = 'exec-and-forget /bin/bash ~/.config/aerospace/cycle_workspace.sh next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    cmd-ctrl-1 = ['move-node-to-workspace --focus-follows-window 1*', 'exec-and-forget hs -c "almostMaximize()"']
    cmd-ctrl-2 = ['move-node-to-workspace --focus-follows-window 2*', 'exec-and-forget hs -c "almostMaximize()"']
    cmd-ctrl-3 = ['move-node-to-workspace --focus-follows-window 3*', 'exec-and-forget hs -c "almostMaximize()"']
    cmd-ctrl-4 = ['move-node-to-workspace --focus-follows-window 4*', 'exec-and-forget hs -c "almostMaximize()"']
    cmd-ctrl-5 = ['move-node-to-workspace --focus-follows-window 5*', 'exec-and-forget hs -c "almostMaximize()"']

    cmd-shift-ctrl-1 = ['move-node-to-workspace --focus-follows-window 1^', 'exec-and-forget hs -c "almostMaximize()"']
    cmd-shift-ctrl-2 = ['move-node-to-workspace --focus-follows-window 2^', 'exec-and-forget hs -c "almostMaximize()"']
    # cmd-shift-ctrl-3 = 'move-node-to-workspace --focus-follows-window 3^'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # cmd-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    # cmd-ctrl-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    cmd-shift-enter = 'mode service'

    # stack: maximize every window in the current workspace (Rectangle, via Hammerspoon)
    cmd-shift-m = 'exec-and-forget hs -c "almostMaximizeFocusedWorkspace()"'
    cmd-shift-n = 'mode move'

[mode.move.binding]
    1 = ['move-node-to-workspace --focus-follows-window 1*', 'mode main']
    2 = ['move-node-to-workspace --focus-follows-window 2*', 'mode main']
    3 = ['move-node-to-workspace --focus-follows-window 3*', 'mode main']
    4 = ['move-node-to-workspace --focus-follows-window 4*', 'mode main']
    5 = ['move-node-to-workspace --focus-follows-window 5*', 'mode main']
    m = ['exec-and-forget aerospace list-windows --all --format "%{window-id}" | xargs -I{} aerospace move-node-to-workspace --window-id {} 1* && aerospace workspace 1* && hs -c "almostMaximizeAll()"', 'mode main']
    shift-1 = ['move-node-to-workspace --focus-follows-window 1^', 'mode main']
    shift-2 = ['move-node-to-workspace --focus-follows-window 2^', 'mode main']
    esc = ['mode main']

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['flatten-workspace-tree', 'mode main'] # reset layout
    r = ['reload-config', 'mode main']
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    # backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    cmd-shift-h = ['join-with left', 'mode main']
    cmd-shift-j = ['join-with down', 'mode main']
    cmd-shift-k = ['join-with up', 'mode main']
    cmd-shift-l = ['join-with right', 'mode main']
    
    # down = 'volume down'
    # up = 'volume up'
    # shift-down = ['volume set 0', 'mode main']

[workspace-to-monitor-force-assignment]
    # main monitor
    "1*" = 'main'
    "2*" = 'main'
    "3*" = 'main'
    "4*" = 'main'
    "5*" = 'main'

    # secondary monitors
    "1^" = ['dell', 'built-in']
    "2^" = ['dell', 'built-in']
    # "3^" = ['dell', 'built-in']

# floating windows by default
[[on-window-detected]]
    check-further-callbacks = true
    run = 'layout floating'

# Excluded from auto-centering: float (already) but skip the center callback below.
# check-further-callbacks defaults false, so a match here stops further callbacks.
[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = 'layout floating'
[[on-window-detected]]
    if.app-id = 'com.valvesoftware.steam'
    run = 'layout floating'
[[on-window-detected]]
    if.app-id = 'com.valvesoftware.steam.helper'
    run = 'layout floating'

[[on-window-detected]]
    run = 'exec-and-forget hs -c "center()"'

